<!doctype html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>پنل ادمین</title>
  <link rel="shortcut icon" href="bg.jpg" type="image/x-icon" />
  <style>
    @font-face {
      font-family: vazir;
      src: url(Vazir-Bold.ttf);
      font-style: normal;
      font-weight: normal;
    }

    body {
      font-family: vazir !important;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: url(bg.jpg);
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-position: center;
      padding: 30px 20px;
    }

    .box {
      background: #333;
      border-radius: 12px;
      padding: 30px;
      max-width: 500px;
      margin: 0 auto 30px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    h2 {
      margin-bottom: 20px;
      color: #ccc;
    }

    input,
    textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: vazir;
      font-size: 0.95rem;
      color: #fff;
      background-color: #333;
    }

    textarea {
      height: 100px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 11px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-family: vazir;
    }

    button:hover {
      background: #4338ca;
    }

    #status {
      margin-top: 10px;
      font-size: 0.9rem;
      min-height: 20px;
    }

    #post-list {
      list-style: none;
      margin-top: 10px;
    }

    #post-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-size: 0.9rem;
      color: #333;
    }

    #post-list li:last-child {
      border-bottom: none;
    }

    span {
      color: #fff;
    }

    .del-btn {
      width: auto;
      padding: 5px 12px;
      background: #ef4444;
      font-size: 0.8rem;
      margin-right: 10px;
    }

    .del-btn:hover {
      background: #dc2626;
    }

    #login-section,
    #admin-section {
      display: block;
    }
  </style>
</head>

<body>
  <!-- صفحه لاگین -->
  <div class="box" id="login-section">
    <h2>ورود به پنل</h2>
    <input type="password" id="pass-input" placeholder="رمز عبور" />
    <button onclick="doLogin()">ورود</button>
    <p id="login-error" style="color: red; margin-top: 10px; font-size: 0.9rem"></p>
  </div>

  <!-- پنل ادمین -->
  <div class="box" id="admin-section" style="display: none">
    <h2>افزودن کارت جدید</h2>
    <input type="text" id="new-title" placeholder="عنوان کارت" />
    <textarea id="new-content" placeholder="متن کارت"></textarea>
    <button onclick="addPost()">افزودن کارت</button>
    <p id="status"></p>
  </div>

  <div class="box" id="list-section" style="display: none">
    <h2>کارت‌های موجود</h2>
    <ul id="post-list"></ul>
  </div>

  <script>
    const BIN_ID = "6a1b25b321f9ee59d29e770e";
    const API_KEY =
      "$2a$10$SfM1tRVwgK2pRkyJ73yCpeLmwW9QZVgCXd2qFKds9..0rJ4/m.IGG";
    const ADMIN_PASS = "2e4r4sd";

    let posts = [];
    function doLogin() {
      const val = document.getElementById("pass-input").value;
      if (val === ADMIN_PASS) {
        document.getElementById("login-section").style.display =
          "none";
        document.getElementById("admin-section").style.display =
          "block";
        document.getElementById("list-section").style.display =
          "block";
        loadPosts();
      } else {
        document.getElementById("login-error").textContent =
          "رمز اشتباه است";
      }
    }

    // با Enter هم لاگین کنه
    document
      .getElementById("pass-input")
      .addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });

    async function loadPosts() {
      const res = await fetch(
        `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,
        {
          headers: { "X-Master-Key": API_KEY },
        },
      );
      const data = await res.json();
      posts = data.record.posts || [];
      renderList();
    }

    async function savePosts() {
      await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": API_KEY,
        },
        body: JSON.stringify({ posts }),
      });
    }

    async function addPost() {
      const title = document.getElementById("new-title").value.trim();
      const content = document
        .getElementById("new-content")
        .value.trim();
      const status = document.getElementById("status");

      if (!title || !content) {
        status.style.color = "red";
        status.textContent = "عنوان و متن را پر کنید";
        return;
      }

      posts.push({ title, content });
      await savePosts();

      document.getElementById("new-title").value = "";
      document.getElementById("new-content").value = "";
      status.style.color = "green";
      status.textContent = "کارت با موفقیت اضافه شد ✓";
      renderList();

      setTimeout(() => (status.textContent = ""), 3000);
    }

    async function deletePost(index) {
      if (!confirm("این کارت حذف شود؟")) return;
      posts.splice(index, 1);
      await savePosts();
      renderList();
    }
    function renderList() {
      const list = document.getElementById("post-list");
      if (posts.length === 0) {
        list.innerHTML = "<li>هنوز کارتی وجود ندارد</li>";
        return;
      }
      // جدیدترین بالا
      list.innerHTML = [...posts]
        .reverse()
        .map((post, i) => {
          const realIndex = posts.length - 1 - i;
          return `
          <li>
            <span>${post.title}</span>
            <button class="del-btn" onclick="deletePost(${realIndex})">حذف</button>
          </li>
        `;
        })
        .join("");
    }
  </script>
</body>

</html>
